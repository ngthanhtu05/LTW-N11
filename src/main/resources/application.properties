server.port=8080

spring.config.import=optional:file:.env[.properties]
spring.application.name=sportshop
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://localhost:3306/sportshop
spring.datasource.username=root
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql: true
# spring.sql.init.mode=always


#config view engine
spring.mvc.view.prefix=/WEB-INF/view/
spring.mvc.view.suffix=.jsp

#default = 1MB
spring.servlet.multipart.max-file-size=50MB
#default = 10 MB (form data)
spring.servlet.multipart.max-request-size=50MB

#security-log
logging.level.org.springframework.security=DEBUG

#config-session
spring.session.store-type=jdbc
spring.session.timeout=30m
spring.session.jdbc.initialize-schema=always
#server.servlet.session.timeout
#spring.session.jdbc.table-name=SPRING_SESSION


sportshop.vnpay.tmn-code=EHYC8UEO
sportshop.vnpay.hash-secret=${VNPAY_HASH_SECRET}
sportshop.vnpay.vnp-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
sportshop.vnpay.vnp-return-url=http://localhost:8080/order/payment-return
spring.security.oauth2.client.registration.google.client-id=32314551218-42dgvaitjuqjcfl6t239i608efcanh7p.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
